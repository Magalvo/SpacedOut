<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Head Steered Space Flight</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; }
        canvas { display: block; }
        #video {
            position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
            transform: scaleX(-1); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; z-index: 20; pointer-events: none;
        }
        #controls-hint {
            position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.7);
            z-index: 20; font-size: 14px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
        #speed-readout {
            position: absolute; bottom: 20px; left: 20px; color: #00ffaa;
            z-index: 20; font-size: 24px; font-weight: bold; font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 id="loading-text">Loading AI Model...</h2>
    </div>
    
    <div id="controls-hint">
        <b>Flight Controls:</b><br>
        W: Boost Speed<br>
        S: Air Brakes<br>
        Face Turn: Steer Ship (Pitch & Yaw)<br>
        Face Lean: Dodge in Cockpit (Parallax)<br>
        Blink: Fire Lasers
    </div>

    <div id="speed-readout">SPD: 100%</div>

    <video id="video" autoplay playsinline></video>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";

        // ==========================================
        // 1. THREE.JS SCENE & RIG SETUP
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const playerRig = new THREE.Group();
        // Give the rig a specific rotation order for flight mechanics
        playerRig.rotation.order = 'YXZ'; 
        scene.add(playerRig);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        playerRig.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pointLight = new THREE.PointLight(0xffffff, 1.5, 200);
        playerRig.add(pointLight); 

        // ==========================================
        // 2. ENDLESS TARGET GENERATION
        // ==========================================
        const targets = [];
        const targetColors = [0x0055ff, 0x00ffaa, 0xff0055];

        function spawnDebris() {
            const size = Math.random() * 1.5 + 0.5;
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const color = targetColors[Math.floor(Math.random() * targetColors.length)];
            const material = new THREE.MeshStandardMaterial({ color: color, wireframe: true });
            
            const mesh = new THREE.Mesh(geometry, material);
            const localSpawnPos = new THREE.Vector3(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 80, 
                -150 - Math.random() * 100   
            );
            
            localSpawnPos.applyMatrix4(playerRig.matrixWorld);
            mesh.position.copy(localSpawnPos);
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            scene.add(mesh);
            targets.push({ mesh: mesh, color: color });
        }

        for(let i = 0; i < 150; i++) spawnDebris();

        // ==========================================
        // 3. KEYBOARD (SPEED ONLY NOW)
        // ==========================================
        const keys = { w: false, s: false };
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        const BASE_SPEED = 0.2; const BOOST_SPEED = 1.2; const BRAKE_SPEED = 0.05;
        let currentSpeed = BASE_SPEED;
        const speedUI = document.getElementById("speed-readout");

        // ==========================================
        // 4. EXPLOSIONS & LASERS
        // ==========================================
        const explosions = []; const lasers = [];

        function createExplosion(x, y, z, colorHex) {
            const particleCount = 40;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
                velocities.push(new THREE.Vector3((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 1.5));
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: colorHex, size: 0.4, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            explosions.push({ mesh: particles, velocities: velocities, life: 1.0 });
        }

        let lastShotTime = 0;
        function fireLaser() {
            const now = Date.now();
            if (now - lastShotTime < 400) return; 
            lastShotTime = now;

            const geometry = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
            geometry.rotateX(Math.PI / 2); 
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            const worldPos = new THREE.Vector3(); const worldQuat = new THREE.Quaternion();
            camera.getWorldPosition(worldPos); camera.getWorldQuaternion(worldQuat);
            
            [-0.6, 0.6].forEach(offsetX => {
                const laser = new THREE.Mesh(geometry, material);
                laser.position.copy(worldPos); laser.quaternion.copy(worldQuat); 
                laser.translateX(offsetX); laser.translateZ(-2);
                scene.add(laser); lasers.push(laser);
            });
        }

        // ==========================================
        // 5. MEDIAPIPE (FLIGHT STICK MODE)
        // ==========================================
        let faceLandmarker;
        const video = document.getElementById("video");
        
        let targetCamPos = new THREE.Vector2(0, 0); // Still used for dodging
        
        // NEW: Turn velocities instead of absolute rotations
        let turnVelocityYaw = 0;
        let turnVelocityPitch = 0;

        async function initVisionAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
            document.getElementById("ui-layer").style.display = "none"; 
        }

        let lastVideoTime = -1;
        function getDistance(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // 1. Cockpit Dodging (Parallax stays the same)
                    const nose = landmarks[1]; 
                    targetCamPos.x = (nose.x - 0.5) * -2.0 * 6.0;
                    targetCamPos.y = -((nose.y - 0.5) * -2.0 * 6.0);

                    // 2. Flight Stick Steering Logic
                    const leftEar = landmarks[234]; const rightEar = landmarks[454];
                    const topHead = landmarks[10]; const chin = landmarks[152];

                    // Calculate absolute head angle
                    const rawYaw = Math.atan2(rightEar.z - leftEar.z, rightEar.x - leftEar.x);
                    const rawPitch = -Math.atan2(chin.z - topHead.z, chin.y - topHead.y);

                    // DEADZONE LOGIC: Ignore tiny movements.
                    // If the angle is greater than 0.1 radians, we start turning the ship.
                    const DEADZONE = 0.1;
                    const STEERING_SENSITIVITY = 0.03; // How fast the ship turns

                    if (Math.abs(rawYaw) > DEADZONE) {
                        // Subtract the deadzone so the turn starts smoothly from 0 speed
                        const direction = Math.sign(rawYaw);
                        turnVelocityYaw = (Math.abs(rawYaw) - DEADZONE) * direction * STEERING_SENSITIVITY;
                    } else {
                        turnVelocityYaw = 0;
                    }

                    if (Math.abs(rawPitch) > DEADZONE) {
                        const direction = Math.sign(rawPitch);
                        turnVelocityPitch = (Math.abs(rawPitch) - DEADZONE) * direction * STEERING_SENSITIVITY;
                    } else {
                        turnVelocityPitch = 0;
                    }

                    // Blink to fire
                    if (getDistance(landmarks[159], landmarks[145]) < 0.012 && getDistance(landmarks[386], landmarks[374]) < 0.012) {
                        fireLaser();
                    }
                } else {
                    // Auto-stop turning if face is lost
                    turnVelocityYaw = 0;
                    turnVelocityPitch = 0;
                }
            }
            requestAnimationFrame(predictWebcam);
        }
        initVisionAI();

        // ==========================================
        // 6. MAIN GAME LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // -- FLIGHT MECHANICS --
            let targetSpeed = BASE_SPEED;
            if (keys.w) targetSpeed = BOOST_SPEED;
            if (keys.s) targetSpeed = BRAKE_SPEED;
            currentSpeed += (targetSpeed - currentSpeed) * 0.05;
            speedUI.innerText = `SPD: ${Math.round((currentSpeed / BASE_SPEED) * 100)}%`;

            // NEW: Apply the turn velocities to the Rig (The Ship)
            playerRig.rotation.y += turnVelocityYaw;
            playerRig.rotation.x += turnVelocityPitch;

            // Optional Polish: Add a slight "bank" roll to the ship when yawing for realism
            const targetRoll = -turnVelocityYaw * 10;
            playerRig.rotation.z += (targetRoll - playerRig.rotation.z) * 0.1;

            // Move the ship forward constantly
            playerRig.translateZ(-currentSpeed);

            // -- HEAD TRACKING (Dodging only) --
            // We smoothly glide the camera to dodge inside the cockpit, but keep its rotation locked forward
            camera.position.x += (targetCamPos.x - camera.position.x) * 0.1;
            camera.position.y += (targetCamPos.y - camera.position.y) * 0.1;
            camera.rotation.set(0, 0, 0); 

            // -- ENVIRONMENT & EFFECTS MANAGEMENT --
            if (Math.random() < 0.2) spawnDebris(); 

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                t.mesh.rotation.x += 0.002; t.mesh.rotation.y += 0.003;
                if (t.mesh.position.distanceTo(playerRig.position) > 250) {
                    scene.remove(t.mesh); targets.splice(i, 1);
                }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                const pos = exp.mesh.geometry.attributes.position.array;
                for (let p = 0; p < pos.length / 3; p++) {
                    pos[p * 3] += exp.velocities[p].x; pos[p * 3 + 1] += exp.velocities[p].y; pos[p * 3 + 2] += exp.velocities[p].z;
                }
                exp.mesh.geometry.attributes.position.needsUpdate = true;
                exp.life -= 0.03; 
                exp.mesh.material.opacity = exp.life;
                if (exp.life <= 0) {
                    scene.remove(exp.mesh); exp.mesh.geometry.dispose(); exp.mesh.material.dispose();
                    explosions.splice(i, 1);
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                laser.translateZ(-(2.0 + currentSpeed)); 

                if (laser.position.distanceTo(playerRig.position) > 200) {
                    scene.remove(laser); lasers.splice(i, 1); continue;
                }

                for (let j = targets.length - 1; j >= 0; j--) {
                    const targetData = targets[j];
                    if (laser.position.distanceTo(targetData.mesh.position) < 3.0) {
                        createExplosion(targetData.mesh.position.x, targetData.mesh.position.y, targetData.mesh.position.z, targetData.color);
                        scene.remove(targetData.mesh); targets.splice(j, 1);
                        scene.remove(laser); lasers.splice(i, 1);
                        break; 
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
