<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Parallax Game - Lasers & Explosions</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; }
        canvas { display: block; }
        #video {
            position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
            transform: scaleX(-1); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; z-index: 20; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 id="loading-text">Loading AI Model...</h2>
        <p>Please allow webcam access when prompted.</p>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";

        // ==========================================
        // 1. THREE.JS SCENE SETUP
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraBaseZ = 10;
        camera.position.z = cameraBaseZ;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const targets = [];
        const lasers = [];
        const explosions = []; // NEW: Array to track active explosions

        const createDebrisLayer = (color, baseZ, count, size) => {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const material = new THREE.MeshStandardMaterial({ color: color, wireframe: true });
            
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 60, baseZ + (Math.random() - 0.5) * 10);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                scene.add(mesh);
                targets.push({ mesh: mesh, color: color }); // Store color for explosion
            }
        };

        createDebrisLayer(0x0055ff, -20, 100, 2); 
        createDebrisLayer(0x00ffaa, -5, 50, 1);   
        createDebrisLayer(0xff0055, 5, 20, 0.5);  

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(0, 0, 15);
        scene.add(pointLight);

        // ==========================================
        // 2. PARTICLE EXPLOSION SYSTEM (NEW)
        // ==========================================
        function createExplosion(x, y, z, colorHex) {
            const particleCount = 40;
            const geometry = new THREE.BufferGeometry();
            // Each particle needs an x, y, and z coordinate (so array size is count * 3)
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                // Set initial position to the destroyed target's location
                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                // Give each particle a random velocity direction and speed
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5
                );
                velocities.push(velocity);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: colorHex,
                size: 0.3,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending // Makes the particles glow when they overlap
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            explosions.push({
                mesh: particles,
                velocities: velocities,
                life: 1.0 // This acts as a timer. 1.0 is full life, 0 is dead.
            });
        }

        // ==========================================
        // 3. LASER MECHANICS
        // ==========================================
        let lastShotTime = 0;
        const SHOT_COOLDOWN = 500; 

        function fireLaser() {
            const now = Date.now();
            if (now - lastShotTime < SHOT_COOLDOWN) return; 
            lastShotTime = now;

            const geometry = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
            geometry.rotateX(Math.PI / 2); 
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            const offsets = [-0.5, 0.5]; 
            
            offsets.forEach(offsetX => {
                const laser = new THREE.Mesh(geometry, material);
                laser.position.copy(camera.position);
                laser.position.x += offsetX;
                laser.position.z -= 2; 
                scene.add(laser);
                lasers.push(laser);
            });
        }

        // ==========================================
        // 4. MEDIAPIPE AI TRACKING SETUP
        // ==========================================
        let faceLandmarker;
        const video = document.getElementById("video");
        let targetCameraPos = new THREE.Vector2(0, 0);

        async function initVisionAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
            document.getElementById("ui-layer").style.display = "none"; 
        }

        let lastVideoTime = -1;
        function getDistance(point1, point2) { return Math.hypot(point2.x - point1.x, point2.y - point1.y); }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const nose = landmarks[1]; 
                    targetCameraPos.x = (nose.x - 0.5) * -2.0 * 10.0;
                    targetCameraPos.y = -((nose.y - 0.5) * -2.0 * 10.0);

                    const BLINK_THRESHOLD = 0.012; 
                    if (getDistance(landmarks[159], landmarks[145]) < BLINK_THRESHOLD && getDistance(landmarks[386], landmarks[374]) < BLINK_THRESHOLD) {
                        fireLaser();
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }
        initVisionAI();

        // ==========================================
        // 5. GAME RENDER & COLLISION LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            camera.position.x += (targetCameraPos.x - camera.position.x) * 0.1;
            camera.position.y += (targetCameraPos.y - camera.position.y) * 0.1;
            camera.lookAt(0, 0, 0);

            targets.forEach(t => { t.mesh.rotation.x += 0.002; t.mesh.rotation.y += 0.003; });

            // UPDATE EXPLOSIONS (NEW)
            for (let i = explosions.length - 1; i >= 0; i--) {
                const explosion = explosions[i];
                const positions = explosion.mesh.geometry.attributes.position.array;

                // Move each particle by its velocity
                for (let p = 0; p < positions.length / 3; p++) {
                    positions[p * 3] += explosion.velocities[p].x;
                    positions[p * 3 + 1] += explosion.velocities[p].y;
                    positions[p * 3 + 2] += explosion.velocities[p].z;
                }
                
                // Tell Three.js that the positions have changed
                explosion.mesh.geometry.attributes.position.needsUpdate = true;

                // Fade out the explosion
                explosion.life -= 0.03; 
                explosion.mesh.material.opacity = explosion.life;

                // Delete the explosion entirely when faded to prevent lag
                if (explosion.life <= 0) {
                    scene.remove(explosion.mesh);
                    explosion.mesh.geometry.dispose();
                    explosion.mesh.material.dispose();
                    explosions.splice(i, 1);
                }
            }

            // UPDATE LASERS AND COLLISIONS
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                laser.position.z -= 1; 

                if (laser.position.z < -40) {
                    scene.remove(laser);
                    lasers.splice(i, 1);
                    continue;
                }

                for (let j = targets.length - 1; j >= 0; j--) {
                    const targetData = targets[j];
                    const dist = laser.position.distanceTo(targetData.mesh.position);
                    
                    if (dist < 2.5) {
                        // BOOM! Trigger the explosion before removing the target
                        createExplosion(
                            targetData.mesh.position.x, 
                            targetData.mesh.position.y, 
                            targetData.mesh.position.z, 
                            targetData.color
                        );
                        
                        scene.remove(targetData.mesh);
                        targets.splice(j, 1);
                        scene.remove(laser);
                        lasers.splice(i, 1);
                        break; 
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
