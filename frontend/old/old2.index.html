<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Parallax Game - Laser Eyes</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; }
        canvas { display: block; }
        #video {
            position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
            transform: scaleX(-1); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; z-index: 20; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 id="loading-text">Loading AI Model...</h2>
        <p>Please allow webcam access when prompted.</p>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";

        // ==========================================
        // 1. THREE.JS SCENE SETUP
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraBaseZ = 10;
        camera.position.z = cameraBaseZ;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Game state arrays
        const targets = [];
        const lasers = [];

        // Create floating debris (Targets)
        const createDebrisLayer = (color, baseZ, count, size) => {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const material = new THREE.MeshStandardMaterial({ color: color, wireframe: true });
            
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 60, baseZ + (Math.random() - 0.5) * 10);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                scene.add(mesh);
                targets.push(mesh); // Store for collision detection
            }
        };

        createDebrisLayer(0x0055ff, -20, 100, 2); 
        createDebrisLayer(0x00ffaa, -5, 50, 1);   
        createDebrisLayer(0xff0055, 5, 20, 0.5);  

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(0, 0, 15);
        scene.add(pointLight);

        // ==========================================
        // 2. LASER MECHANICS
        // ==========================================
        let lastShotTime = 0;
        const SHOT_COOLDOWN = 500; // milliseconds

        function fireLaser() {
            const now = Date.now();
            if (now - lastShotTime < SHOT_COOLDOWN) return; // Prevent spamming
            lastShotTime = now;

            // Create a glowing red cylinder
            const geometry = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
            geometry.rotateX(Math.PI / 2); // Point it forward along the Z-axis
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            // Fire two lasers (one from each side of the camera)
            const offsets = [-0.5, 0.5]; 
            
            offsets.forEach(offsetX => {
                const laser = new THREE.Mesh(geometry, material);
                // Spawn the laser at the camera's current parallax position
                laser.position.copy(camera.position);
                laser.position.x += offsetX;
                laser.position.z -= 2; // Start slightly in front of the camera
                
                scene.add(laser);
                lasers.push(laser);
            });
        }

        // ==========================================
        // 3. MEDIAPIPE AI TRACKING SETUP
        // ==========================================
        let faceLandmarker;
        const video = document.getElementById("video");
        let targetCameraPos = new THREE.Vector2(0, 0);

        async function initVisionAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
            document.getElementById("ui-layer").style.display = "none"; 
        }

        let lastVideoTime = -1;

        // Helper function for the distance math
        function getDistance(point1, point2) {
            return Math.hypot(point2.x - point1.x, point2.y - point1.y);
        }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // 1. Parallax Movement (Nose tracking)
                    const nose = landmarks[1]; 
                    targetCameraPos.x = (nose.x - 0.5) * -2.0 * 10.0;
                    targetCameraPos.y = -((nose.y - 0.5) * -2.0 * 10.0);

                    // 2. Blink Detection (Eyelid tracking)
                    // You might need to adjust this threshold depending on webcam resolution/distance
                    const BLINK_THRESHOLD = 0.018; 

                    const leftEyeDist = getDistance(landmarks[159], landmarks[145]);
                    const rightEyeDist = getDistance(landmarks[386], landmarks[374]);

                    // If both eyes are closed past the threshold, shoot!
                    if (leftEyeDist < BLINK_THRESHOLD && rightEyeDist < BLINK_THRESHOLD) {
                        fireLaser();
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        initVisionAI();

        // ==========================================
        // 4. GAME RENDER & COLLISION LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Smooth parallax camera movement
            camera.position.x += (targetCameraPos.x - camera.position.x) * 0.1;
            camera.position.y += (targetCameraPos.y - camera.position.y) * 0.1;
            camera.lookAt(0, 0, 0);

            // Rotate targets
            targets.forEach(target => {
                target.rotation.x += 0.002;
                target.rotation.y += 0.003;
            });

            // Update lasers and check collisions
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                laser.position.z -= 1; // Move laser forward

                // Remove laser if it goes too far into the background
                if (laser.position.z < -40) {
                    scene.remove(laser);
                    lasers.splice(i, 1);
                    continue;
                }

                // Simple Collision Detection: Check distance between laser and targets
                for (let j = targets.length - 1; j >= 0; j--) {
                    const target = targets[j];
                    const dist = laser.position.distanceTo(target.position);
                    
                    // If laser gets close enough to a target (radius of ~2)
                    if (dist < 2.5) {
                        // 1. Remove target from scene and array
                        scene.remove(target);
                        targets.splice(j, 1);
                        
                        // 2. Remove laser from scene and array
                        scene.remove(laser);
                        lasers.splice(i, 1);
                        break; // Stop checking this laser against other targets
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
