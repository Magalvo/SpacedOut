services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duckua-backend
    ports:
      - "3030:3030"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duckua-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
